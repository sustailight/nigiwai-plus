<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>送信ありがとうございました｜にぎわいプラス</title>
    <link rel="stylesheet" href="style.css?v=10">
    <style>
        .thanks-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 48px 24px; }
        .thanks-box { max-width: 540px; }
        .thanks-icon { width: 72px; height: 72px; margin: 0 auto 24px; border-radius: 50%; background: var(--blue-pale); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; }
        .thanks-box h1 { font-size: clamp(1.5rem, 4vw, 2rem); margin-bottom: 18px; }
        .thanks-box p { color: var(--ink); margin-bottom: 14px; }
        .thanks-box .sub { color: var(--mute); font-size: 0.9rem; }
        .thanks-box .btn { margin-top: 24px; }
    </style>
</head>

<body>
    <main class="thanks-wrap">
        <div class="thanks-box">
            <div class="thanks-icon">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#1C3D5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
            <h1>送信ありがとうございました。</h1>
            <p>内容を確認のうえ、2〜3営業日以内にご連絡いたします。<br>自動返信メールをお送りしていますので、ご確認ください。</p>
            <p class="sub">メールが届かない場合は、迷惑メールフォルダのご確認、または<br>msr.sustailight@gmail.com までご連絡ください。</p>
            <a href="index.html" class="btn btn-ghost">トップへ戻る</a>
        </div>
    </main>
</body>

</html>
